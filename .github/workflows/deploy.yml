name: Deploy Custom Go Blog

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # CRITICAL STEP 1: Ensures your Go code has all its dependencies
      - name: Download Go modules
        run: go mod download

      - name: Run my custom generator
        run: go run main.go

      # CRITICAL STEP 2: Tells us exactly where the files went
      - name: Verify output directory
        run: |
          if [ ! -d "public" ]; then
            echo "Error: The 'public' directory is missing. Your main.go script did not create it!"
            exit 1
          fi
          echo "Success: public/ exists. Here are its contents:"
          ls -la public/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "public/"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
