<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | MY KINDLE-STYLE BLOG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Literata:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@400&display=swap");

      :root {
        --bg-color: #fdfdfd;
        --text-color: #1a1a1a;
        --sidebar-bg: #ffffff;
        --border-color: #e5e5e5;
      }

      [data-theme="dark"] {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --sidebar-bg: #1e1e1e;
        --border-color: #333333;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: "Literata", serif;
        line-height: 1.8;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      .kindle-container {
        max-width: 650px;
        margin: 0 auto;
        padding: 4rem 2rem;
      }
      h1 {
        font-family: "Caveat", cursive;
        font-weight: 700;
        color: var(--text-color);
      }
      .tech-stack {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      #sidebar {
        height: 100%;
        width: 0;
        position: fixed;
        z-index: 2000;
        top: 0;
        left: 0;
        background-color: var(--sidebar-bg);
        overflow: hidden;
        transition: width 0.3s ease;
        border-right: 1px solid var(--border-color);
        padding-top: 60px;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        white-space: nowrap;
        display: flex;
        flex-direction: column;
        font-family: "JetBrains Mono", monospace;
        text-transform: uppercase;
      }

      .menu-content {
        flex: 1;
      }

      .nav-link {
        padding: 15px 25px;
        display: block;
        font-size: 1rem;
        color: var(--text-color);
        border-bottom: 1px solid var(--border-color);
        text-decoration: none;
      }

      .theme-toggle-area {
        padding: 20px 25px;
        border-top: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 34px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #333;
      }
      input:checked + .slider:before {
        transform: translateX(20px);
      }

      #sidebar .close-btn {
        position: absolute;
        top: 10px;
        right: 20px;
        font-size: 30px;
        cursor: pointer;
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="sidebar">
      <div class="close-btn" onclick="closeNav()">&times;</div>
      <div class="menu-content">
        <a href="/" class="nav-link">Home</a>
        <a href="/blog/" class="nav-link">Blog</a>
        <a href="/about/" class="nav-link">About</a>
        <a href="/portfolio/" class="nav-link">Portfolio</a>
        <a href="/contact/" class="nav-link">Contact</a>
      </div>
      <div class="theme-toggle-area">
        <span class="text-sm font-bold tracking-widest">Dark Mode</span>
        <label class="switch">
          <input
            type="checkbox"
            id="theme-toggle-input"
            onchange="toggleTheme()"
          />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="p-6">
      <button onclick="openNav()" class="text-2xl font-bold font-sans">
        ☰
      </button>
    </div>

    <main class="kindle-container">
      <h1 class="text-6xl mb-6">Hello.</h1>

      <div class="tech-stack space-y-2 mb-4">
        <p>HTML / CSS / TAILWIND</p>
        <p>JAVASCRIPT / TYPESCRIPT</p>
        <p>NODE / EXPRESS / REACT</p>
        <p>GO</p>
      </div>

      <div class="flex gap-4 mt-5">
        <a
          href="https://github.com"
          target="_blank"
          class="text-[var(--text-color)] opacity-70 hover:opacity-100 transition-opacity"
        >
          <svg height="28" viewBox="0 0 16 16" width="28" fill="currentColor">
            <path
              d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
            ></path>
          </svg>
        </a>
        <a
          href="https://twitter.com"
          target="_blank"
          class="text-[var(--text-color)] opacity-70 hover:opacity-100 transition-opacity"
        >
          <svg height="28" viewBox="0 0 24 24" width="28" fill="currentColor">
            <path
              d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"
            />
          </svg>
        </a>
        <a
          href="mailto:email@example.com"
          class="text-[var(--text-color)] opacity-70 hover:opacity-100 transition-opacity"
        >
          <svg height="28" viewBox="0 0 24 24" width="28" fill="currentColor">
            <path
              d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
            />
          </svg>
        </a>
      </div>
    </main>

    <script>
      function openNav() {
        document.getElementById("sidebar").style.width = "280px";
      }
      function closeNav() {
        document.getElementById("sidebar").style.width = "0";
      }

      function toggleTheme() {
        const body = document.documentElement;
        const isDark = body.getAttribute("data-theme") === "dark";
        body.setAttribute("data-theme", isDark ? "" : "dark");
        document.getElementById("theme-toggle-input").checked = !isDark;
      }
    </script>
  </body>
</html>
