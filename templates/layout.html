<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }} | MY KINDLE-STYLE BLOG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Literata:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@400&display=swap");

      :root {
        --bg-color: #fdfdfd;
        --text-color: #1a1a1a;
        --sidebar-bg: #ffffff;
        --border-color: #e5e5e5;
        --code-bg: #f4f4f4;
      }

      [data-theme="dark"] {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --sidebar-bg: #1e1e1e;
        --border-color: #333333;
        --code-bg: #2a2a2a;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: "Literata", serif;
        line-height: 1.8;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      .kindle-container {
        max-width: 650px;
        margin: 0 auto;
        padding: 4rem 2rem;
      }

      h1,
      h2 {
        font-family: "Caveat", cursive;
        font-weight: 700;
      }

      .meta,
      .tags {
        font-family: "JetBrains Mono", monospace;
        color: #888;
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .tag {
        background: var(--code-bg);
        padding: 2px 8px;
        border-radius: 4px;
        margin-right: 8px;
        font-family: "JetBrains Mono", monospace;
      }

      #sidebar {
        height: 100%;
        width: 0;
        position: fixed;
        z-index: 2000;
        top: 0;
        left: 0;
        background-color: var(--sidebar-bg);
        overflow: hidden;
        transition: width 0.3s ease;
        border-right: 1px solid var(--border-color);
        padding-top: 60px;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        white-space: nowrap;
        display: flex;
        flex-direction: column;
        font-family: "JetBrains Mono", monospace;
        text-transform: uppercase;
      }

      .menu-content {
        flex: 1;
      }

      .nav-link {
        padding: 15px 25px;
        display: block;
        font-size: 1rem;
        color: var(--text-color);
        border-bottom: 1px solid var(--border-color);
        text-decoration: none;
      }

      .theme-toggle-area {
        padding: 20px 25px;
        border-top: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 34px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #333;
      }
      input:checked + .slider:before {
        transform: translateX(20px);
      }

      #sidebar .close-btn {
        position: absolute;
        top: 10px;
        right: 20px;
        font-size: 30px;
        cursor: pointer;
      }

      /* Code Block Styling */
      code {
        font-family: "JetBrains Mono", monospace;
        background: var(--code-bg);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-size: 0.9em;
      }

      pre {
        background: var(--code-bg);
        padding: 1.5rem;
        border-radius: 8px;
        overflow-x: auto;
        margin: 2rem 0;
        border: 1px solid var(--border-color);
      }

      pre code {
        background: transparent;
        padding: 0;
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="sidebar">
      <div class="close-btn" onclick="closeNav()">&times;</div>
      <div class="menu-content">
        <a href="/" class="nav-link">Home</a>
        <a href="/blog/" class="nav-link">Blog</a>
        <a href="/about/" class="nav-link">About</a>
        <a href="/portfolio/" class="nav-link">Portfolio</a>
        <a href="/contact/" class="nav-link">Contact</a>
      </div>
      <div class="theme-toggle-area">
        <span class="text-sm font-bold tracking-widest">Dark Mode</span>
        <label class="switch">
          <input
            type="checkbox"
            id="theme-toggle-input"
            onchange="toggleTheme()"
          />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="p-6">
      <button onclick="openNav()" class="text-2xl font-bold font-sans">
        ☰
      </button>
    </div>

    <article class="kindle-container">
      <header class="border-b border-[var(--border-color)] pb-8 mb-8">
        <h1 class="text-4xl md:text-5xl mb-4 leading-tight">{{ .Title }}</h1>

        <div class="tags mb-4">
          {{ range .Tags }}
          <span class="tag">#{{ . }}</span>
          {{ end }}
        </div>

        <div class="meta">
          <span>{{ .Date }}</span>
        </div>
      </header>

      <main class="space-y-6 text-lg md:text-xl">{{ .Content }}</main>
    </article>

    <script>
      function openNav() {
        document.getElementById("sidebar").style.width = "280px";
      }
      function closeNav() {
        document.getElementById("sidebar").style.width = "0";
      }

      function toggleTheme() {
        const body = document.documentElement;
        const isDark = body.getAttribute("data-theme") === "dark";
        body.setAttribute("data-theme", isDark ? "" : "dark");
        document.getElementById("theme-toggle-input").checked = !isDark;
      }
    </script>
  </body>
</html>
