<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="antialiased">
    {{ template "sidebar" . }}

    <div class="p-6">
      <button onclick="openNav()" class="text-2xl font-bold font-sans">
        ☰
      </button>
    </div>

    <article class="kindle-container">
      <header class="border-b border-[var(--border-color)] pb-8 mb-8">
        <h1 class="text-4xl md:text-5xl mb-4 leading-tight">{{ .Title }}</h1>

        <div class="tags mb-4">
          {{ range .Tags }}
          <span class="tag">#{{ . }}</span>
          {{ end }}
        </div>

        <div class="meta">
          <span>{{ .Date }}</span>
        </div>
      </header>

      <main class="space-y-6 text-lg md:text-xl break-words">
        {{ .Content }}
      </main>
    </article>

    {{ template "themeToggle" . }}
  </body>
</html>
